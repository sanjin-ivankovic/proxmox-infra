# ============================================================================
# Komodo Resource Sync — Stacks (one per service)
# ============================================================================
# Each [[stack]] pins a service to its server, points at its compose file in
# this repo, and supplies env. Env uses [[NAME]] interpolation:
#   - [[TZ]] / [[APPDATA_DIR]] / [[REGISTRY_IMAGE]] -> Komodo Variables (committed, non-secret)
#   - [[BW_DB_PASSWORD]] etc.                       -> periphery [secrets] (host-local, from Vault)
#
# DEPLOY MODEL — single Procedure, not per-stack webhooks
# ------------------------------------------------------
# These [[stack]] entries intentionally set NEITHER `deploy = true` NOR a
# per-stack `/deploy` webhook. Deploys are driven by the `Deploy On Push`
# Procedure (komodo/procedures.toml), which a single GitLab webhook triggers on
# push to main. That Procedure runs BatchDeployStackIfChanged (pattern "*"):
# Periphery pulls the repo on each target host and redeploys ONLY the stacks
# whose compose file (or tracked config_files) changed since the last deploy.
#
# A single batch Procedure deploys all changed stacks. This is a MONOREPO and a
# git webhook fires on EVERY push to the branch (Komodo filters by branch, never
# by path), so one batch covers every stack without per-stack webhook
# bookkeeping. See komodo/README.md (§Deploy flow) and komodo/procedures.toml
# for the full model.
#
# We deliberately do NOT use `auto_update` (the image-registry poller) — image
# tags are pinned in the compose files and bumped via Renovate PRs, so the
# git push is the only deploy trigger.
#
# `after = [...]` on a [[stack]] is only honored by ResourceSync-driven deploys
# (deploy = true), which we don't use — so it is omitted here. For a coordinated
# primary-then-secondary HA rollout, use the `Rollout DNS HA` Procedure
# (komodo/procedures.toml), whose sequential stages give that ordering.
#
# NOTE: each `environment` block below maps a service's docker-compose ${VARS}
# to their sources — non-secret values inline or in variables.toml, secret
# names resolved from the host's periphery [secrets] (host_vars/<svc>.yml).
# ============================================================================

# ----------------------------------------------------------------------------
# DNS — Technitium (authoritative HA pair)
# ----------------------------------------------------------------------------
[[stack]]
name = "technitium-1"
tags = ["dns"]
[stack.config]
server = "technitium-1"
linked_repo = "proxmox-infra"
file_paths = ["services/technitium-1/docker-compose.yml"]
environment = """
TZ = [[TZ]]
APPDATA_DIR = [[APPDATA_DIR]]
DNS_SERVER_DOMAIN = ns1.example.com
DNS_SERVER_ADMIN_PASSWORD = [[DNS_SERVER_ADMIN_PASSWORD]]
"""

[[stack]]
name = "technitium-2"
tags = ["dns"]
[stack.config]
server = "technitium-2"
linked_repo = "proxmox-infra"
file_paths = ["services/technitium-2/docker-compose.yml"]
environment = """
TZ = [[TZ]]
APPDATA_DIR = [[APPDATA_DIR]]
DNS_SERVER_DOMAIN = ns2.example.com
DNS_SERVER_ADMIN_PASSWORD = [[DNS_SERVER_ADMIN_PASSWORD]]
"""

# ----------------------------------------------------------------------------
# DNS — AdGuard (filtering HA pair)
