# ============================================================================
# Komodo Resource Sync — Servers
# ============================================================================
# One [[server]] per LXC host running a Periphery agent (port 8120). Komodo Core
# reconciles these from git. `address` is the periphery endpoint; auth is via
# the v2 PKI handshake (Core's key is trusted by each periphery's config), so no
# secret appears here.
# ============================================================================

[[server]]
name = "technitium-1"
tags = ["dns", "authoritative"]
[server.config]
address = "https://10.10.0.10:8120"
enabled = true

[[server]]
name = "technitium-2"
tags = ["dns", "authoritative"]
[server.config]
address = "https://10.10.0.11:8120"
enabled = true

