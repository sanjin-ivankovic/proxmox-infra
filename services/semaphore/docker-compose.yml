---
# Semaphore CI/CD Service
# Ansible-driven continuous deployment and infrastructure automation
#
# Deployment: Auto-deployed via GitLab CI/CD on push to main
# URL: http://<host-ip>:3000
# Default credentials: admin / (set in .env)

name: semaphore

services:
  semaphore:
    container_name: semaphore
    image: semaphoreui/semaphore:v2.18.12@sha256:f6651f30d5bf962afe13831b579c3e0f02a13a45735f852b4de3225d98859c8e
    ports:
      - 3000:3000
    environment:
      SEMAPHORE_DB_DIALECT: sqlite
      SEMAPHORE_ADMIN: ${SEMAPHORE_ADMIN}
      SEMAPHORE_ADMIN_PASSWORD: ${SEMAPHORE_ADMIN_PASSWORD}
      SEMAPHORE_ADMIN_NAME: ${SEMAPHORE_ADMIN_NAME}
      SEMAPHORE_ADMIN_EMAIL: ${SEMAPHORE_ADMIN_EMAIL}
    volumes:
      - semaphore_data:/var/lib/semaphore
      - semaphore_config:/etc/semaphore
    networks:
      - semaphore_network
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:3000/api/ping',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  semaphore_data:
    external: true
  semaphore_config:
    external: true

networks:
  semaphore_network:
    name: semaphore_network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
