---
# CheckMK Monitoring System
# Open-source IT infrastructure and application monitoring
#
# Deployment: Auto-deployed via GitLab CI/CD on push to main
# Web UI: http://<host-ip>:8080
# Admin: cmkadmin / (set in GitLab variables as CMK_PASSWORD)

name: checkmk

services:
  checkmk:
    image: checkmk/check-mk-raw:2.4.0@sha256:e839594494aec19dfa04c236e35ff624f739e1480f237fa52ce8f9afa011cd4c
    container_name: checkmk
    restart: unless-stopped
    environment:
      - CMK_PASSWORD=${CMK_PASSWORD}
      - TZ=${TZ:-Europe/Berlin}
      - CMK_SITE_ID=cmk
    volumes:
      - ${APPDATA_DIR}/checkmk/sites:/omd/sites
    tmpfs:
      - /opt/omd/sites/cmk/tmp:uid=1000,gid=1000
    ports:
      - 8080:5000
      - 8000:8000
    networks:
      - checkmk_network
    healthcheck:
      test:
        [
          'CMD',
          'omd',
          'status',
          'cmk',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  checkmk_network:
    name: checkmk_network
    driver: bridge
