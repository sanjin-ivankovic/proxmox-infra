---
# ============================================================================
# Talos cluster group vars
# ============================================================================
# Supplies the path vars the talos playbooks need. These are NOT in Terraform
# state, so the dynamic inventory (talos.terraform_state.yml) can't emit them —
# they live here instead.
#
# Talos is driven via the talosctl / kubectl APIs from the control machine, so
# the connection is local and a host Python interpreter is used.
# ============================================================================
ansible_connection: local
ansible_python_interpreter: /usr/bin/python3

# talosctl / kubectl config locations (gitignored, generated by the talos plays).
talos_config_dir: "{{ playbook_dir }}/../../talos/configs"
talos_config_file: "{{ talos_config_dir }}/talosconfig"
talos_kubeconfig_file: "{{ talos_config_dir }}/kubeconfig"
