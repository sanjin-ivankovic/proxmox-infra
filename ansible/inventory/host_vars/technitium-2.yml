---
# ansible/inventory/host_vars/technitium-2.yml
# Host-local Komodo periphery secret for technitium-2 (DNS admin password).
# Same password as technitium-1 (HA pair). Add vault_technitium_admin_password
# via `make -C ansible vault-edit`.

komodo_periphery_secrets:
  DNS_SERVER_ADMIN_PASSWORD: "{{ vault_technitium_admin_password }}"
