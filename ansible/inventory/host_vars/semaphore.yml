---
# ansible/inventory/host_vars/semaphore.yml
# Host-local config + Komodo periphery secrets for semaphore.
# Add the matching vault_semaphore_* keys via `make -C ansible vault-edit`.
#
# Source: kubectl get secret proxmox-infra-env-semaphore -n argo-workflows \
#           -o jsonpath='{.data.ENV_SEMAPHORE}' | base64 -d

# semaphore is an older LXC still on Debian 12 (bookworm). The common_system
# role defaults to Debian 13+; allow 12 just here so plays run. Upgrade the
# container's OS to 13 to drop this override.
common_system_debian_version_min: 12

komodo_periphery_secrets:
  SEMAPHORE_ADMIN_PASSWORD: "{{ vault_semaphore_admin_password }}"
  # SEMAPHORE_ADMIN / _NAME / _EMAIL are non-secret -> komodo/stacks.toml.
