---
# roles/k3s_cluster_cluster/tasks/03-kubeconfig.yml

# Check K3s installation
- name: Check if k3s.yaml exists
  ansible.builtin.stat:
    path: /etc/rancher/k3s/k3s.yaml
  register: k3s_cluster_config_file

# Server-side configuration - update permissions per Rancher docs
- name: Ensure kubeconfig is accessible to users (read-only for group)
  ansible.builtin.file:
    path: /etc/rancher/k3s/k3s.yaml
    mode: '0644' # Rancher's default is world-readable
  when: k3s_cluster_config_file.stat.exists

# Ensure kubeconfig directories and copy kubeconfig
- name: Ensure kubeconfig directories and copy kubeconfig
  tags: [kubeconfig]
  block:
    - name: Ensure .kube directory exists for root
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        mode: '0700'

    - name: Copy kubeconfig to root
      ansible.builtin.copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /root/.kube/config
        owner: root
        group: root
        mode: '{{ k3s_cluster_write_kubeconfig_mode }}'
        remote_src: true
      when: not ansible_check_mode

    - name: Ensure .kube directory exists for ansible_user
      ansible.builtin.file:
        path: '/home/{{ ansible_user }}/.kube'
        state: directory
        mode: '0700'
      become: true

    - name: Copy kubeconfig to ansible_user
      ansible.builtin.copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: '/home/{{ ansible_user }}/.kube/config'
        owner: '{{ ansible_user }}'
        group: '{{ ansible_user }}'
        mode: '{{ k3s_cluster_write_kubeconfig_mode }}'
        remote_src: true
      become: true
      when: not ansible_check_mode

# Fix server URL for both configs
- name: Replace localhost with proper server address in root config
  ansible.builtin.replace:
    path: /root/.kube/config
    regexp: 'https://127.0.0.1:6443'
    replace: 'https://{{ k3s_cluster_apiserver_host }}:{{ k3s_cluster_apiserver_port }}'
  when: k3s_cluster_config_file.stat.exists

- name: Replace localhost with proper server address in user config
  ansible.builtin.replace:
    path: '/home/{{ ansible_user }}/.kube/config'
    regexp: 'https://127.0.0.1:6443'
    replace: 'https://{{ k3s_cluster_apiserver_host }}:{{ k3s_cluster_apiserver_port }}'
  when:
    - k3s_cluster_config_file.stat.exists
    - ansible_user != 'root'

# Environment setup - Rancher typically recommends using the default location
- name: Create system-wide profile script to point to k3s.yaml
  ansible.builtin.copy:
    dest: '/etc/profile.d/k3s.sh'
    content: |
      # K3s kubeconfig configuration - Rancher recommended approach
      if [ -f "/etc/rancher/k3s/k3s.yaml" ]; then
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
      fi
    mode: '0644'

# Remove user-specific shell modifications as Rancher prefers the global approach
- name: Check if user's .bashrc exists
  ansible.builtin.stat:
    path: ~/.bashrc
  register: k3s_cluster_bashrc_stat
  when: ansible_user != 'root'

- name: Check if user's .zshrc exists
  ansible.builtin.stat:
    path: ~/.zshrc
  register: k3s_cluster_zshrc_stat
  when: ansible_user != 'root'

# Local machine kubeconfig setup
- name: Create kubeconfig directory on local machine
  ansible.builtin.file:
    path: '{{ playbook_dir }}/../kubeconfig'
    state: directory
    mode: '0755'
  delegate_to: localhost
  become: false
  run_once: true

- name: Fetch kubeconfig from master to local machine
  ansible.builtin.fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: '{{ playbook_dir }}/../kubeconfig/config'
    flat: true
  when: k3s_cluster_config_file.stat.exists
  run_once: true

- name: Update server URL in local kubeconfig
  ansible.builtin.replace:
    path: '{{ playbook_dir }}/../kubeconfig/config'
    regexp: 'https://127.0.0.1:6443'
    replace: 'https://{{ hostvars[groups["masters"][0]].ansible_host }}:{{ k3s_cluster_apiserver_port }}'
  delegate_to: localhost
  become: false
  when: k3s_cluster_config_file.stat.exists
  run_once: true

- name: Set correct permissions on local kubeconfig
  ansible.builtin.file:
    path: '{{ playbook_dir }}/../kubeconfig/config'
    mode: '0600'
  delegate_to: localhost
  become: false
  when: k3s_cluster_config_file.stat.exists
  run_once: true

- name: Set cluster name in local kubeconfig
  ansible.builtin.replace:
    path: '{{ playbook_dir }}/../kubeconfig/config'
    regexp: '^  name: default$'
    replace: '  name: {{ k3s_cluster_name }}'
  delegate_to: localhost
  become: false
  when: k3s_cluster_config_file.stat.exists
  run_once: true

- name: Set user name in local kubeconfig
  ansible.builtin.replace:
    path: '{{ playbook_dir }}/../kubeconfig/config'
    regexp: '^- name: default$'
    replace: '- name: {{ k3s_cluster_name }}'
  delegate_to: localhost
  become: false
  when: k3s_cluster_config_file.stat.exists
  run_once: true

- name: Update context cluster reference in local kubeconfig
  ansible.builtin.replace:
    path: '{{ playbook_dir }}/../kubeconfig/config'
    regexp: '    cluster: default$'
    replace: '    cluster: {{ k3s_cluster_name }}'
  delegate_to: localhost
  become: false
  when: k3s_cluster_config_file.stat.exists
  run_once: true

- name: Update context user reference in local kubeconfig
  ansible.builtin.replace:
    path: '{{ playbook_dir }}/../kubeconfig/config'
    regexp: '    user: default$'
    replace: '    user: {{ k3s_cluster_name }}'
  delegate_to: localhost
  become: false
  when: k3s_cluster_config_file.stat.exists
  run_once: true

- name: Set current context in local kubeconfig
  ansible.builtin.replace:
    path: '{{ playbook_dir }}/../kubeconfig/config'
    regexp: 'current-context: default$'
    replace: 'current-context: {{ k3s_cluster_name }}'
  delegate_to: localhost
  become: false
  when: k3s_cluster_config_file.stat.exists
  run_once: true

- name: Show helpful message about kubeconfig setup
  ansible.builtin.debug:
    msg: |
      K3s kubeconfig has been set up following Rancher K3s recommendations:

      On the master node:
      - Default kubeconfig location: /etc/rancher/k3s/k3s.yaml
      - KUBECONFIG is set automatically via /etc/profile.d/k3s.sh
      - Users may need to log out and back in for environment changes to take effect

      On your local machine:
      - Kubeconfig is available at: '{{ playbook_dir }}/../kubeconfig/config'
      - Use it with: export KUBECONFIG='{{ playbook_dir }}/../kubeconfig/config'

      To verify connectivity: kubectl get nodes
  run_once: true
