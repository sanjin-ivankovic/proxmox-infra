---
# ansible/roles/checkmk_agent/tasks/debian.yml
# Debian/Ubuntu specific tasks

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install required packages
  ansible.builtin.apt:
    name:
      - wget
      - netcat-openbsd
      - xinetd
    state: present
