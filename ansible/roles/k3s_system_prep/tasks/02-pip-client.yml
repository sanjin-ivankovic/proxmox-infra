---
# roles/k3s_system_prep/tasks/02-pip-client.yml

# Install python3 and pip on macOS using Homebrew if running on Darwin
- name: Install python3 and pip on macOS
  community.general.homebrew:
    name: [python3, pip3]
    state: present
  when: ansible_os_family == 'Darwin'

# Install python3-pip package on Debian-based systems
- name: Install python3-pip on Debian
  ansible.builtin.apt:
    name: python3-pip
    state: present
    update_cache: true
  when: ansible_os_family == 'Debian'

# Install or update the Kubernetes Python client package using pip on Debian/Ubuntu
- name: Install or update the Kubernetes Python client
  ansible.builtin.pip:
    name: '{{ k3s_system_prep_kubernetes_client_package }}'
    extra_args: '{{ k3s_system_prep_kubernetes_client_extra_args }}'
    state: present
  when: not (ansible_os_family == "Darwin") and not ansible_check_mode
