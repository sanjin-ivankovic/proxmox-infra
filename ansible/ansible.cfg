[defaults]
# Inventory settings
# Dynamic inventory: a thin script that reads live Terraform/OpenTofu state via
# `terragrunt state pull` (R2 backend) and emits hosts named by their real
# hostname, grouped by Proxmox tags. group_vars/ next to it still applies
# (e.g. group_vars/talos_cluster.yml for the local-connection Talos vars).
inventory = ./inventory/terraform_state_inventory.py

# Connection settings
remote_user = maintainer
host_key_checking = True
timeout = 60

# Performance settings
gathering = smart
fact_caching = jsonfile
fact_caching_connection = .ansible_facts
fact_caching_timeout = 7200
pipelining = True

# Output settings
stdout_callback = default
deprecation_warnings = True
retry_files_enabled = False

# Path settings
# Roles resolve by bare name from ./roles during the in-repo transition; the
# same roles are ALSO addressable by FQCN (homelab.proxmox.<role>) once the
# collection is built+installed into ./collections (see collections_path).
roles_path = ./roles:~/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles

# Collections: prefer the locally built homelab.proxmox collection in
# ./collections (populated by `make collection` → ansible-galaxy build+install),
# then the user/system paths for the public dependency collections.
collections_path = ./collections:~/.ansible/collections:/usr/share/ansible/collections

# Python settings
interpreter_python = auto_silent

# Vault settings
vault_password_file = ./.vault_pass

[inventory]
# The script inventory is auto-detected; keep the common built-ins enabled too.
enable_plugins = script, yaml, ini, host_list, auto

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=30m -o ConnectionAttempts=10

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

# Windows-specific settings (WinRM)
[winrm]
# Connection timeout
connection_timeout = 60
# Read timeout
read_timeout = 60
# Operation timeout
operation_timeout = 60
# Retry on connection failure
retry_on_connection_failure = True
# Maximum retries
max_retries = 3

[colors]
highlight = white
verbose = blue
warn = bright purple
error = red
debug = dark gray
deprecate = purple
skip = cyan
unreachable = red
ok = green
changed = yellow
diff_add = green
diff_remove = red
diff_lines = cyan
