---
# ============================================================================
# Upgrade Talos OS Version
# ============================================================================
# Performs a rolling upgrade of Talos OS across all nodes.
#
# Usage:
#   make upgrade  # Will prompt for version
#   OR
#   ansible-playbook -i inventory/hosts.yml 07-upgrade-talos.yml -e "talos_version=v1.13.0"
# ============================================================================

- name: Upgrade Talos cluster
  hosts: talos
  gather_facts: false
  become: false  # Talos uses API - no privilege escalation needed
  connection: local
  serial: 1 # Upgrade one node at a time

  tasks:
    - name: Fail if talos_version not specified
      ansible.builtin.fail:
        msg: "talos_version variable required (e.g., -e 'talos_version=v1.13.0')"
      when: talos_version is not defined
      run_once: true

    # Skip nodes already running the target version. Without this, every node
    # is re-cordoned/drained/upgraded even when already current — wasteful, and
    # for a control-plane node that currently holds the VIP it makes
    # `talosctl upgrade` lose its own connection mid-reboot (spurious exit 1,
    # halting the whole rolling upgrade before the workers are reached).
    - name: Detect current Talos version on node
      ansible.builtin.command:
        cmd: >
          talosctl version
          --talosconfig {{ talos_config_file }}
          --nodes {{ ansible_host }}
          --endpoints {{ talos_upgrade_endpoint }}
      environment:
        TALOSCONFIG: '{{ talos_config_file }}'
      register: node_version_raw
      changed_when: false
      delegate_to: localhost

    # `talosctl version` prints the Client Tag first, then the Server Tag — so
    # the LAST `Tag:` line is the node's running (server) version. (A node-self
    # regex on "Server:" is unreliable due to tab/space layout.)
    - name: Set needs_upgrade fact (current server version vs target)
      ansible.builtin.set_fact:
        node_current_version: "{{ node_version_raw.stdout | regex_findall('Tag:\\s*(\\S+)') | last }}"
        needs_upgrade: "{{ (node_version_raw.stdout | regex_findall('Tag:\\s*(\\S+)') | last) != talos_version }}"

    - name: Report node already on target version (skipping)
      ansible.builtin.debug:
        msg: "↷ {{ inventory_hostname }} already on {{ talos_version }} — skipping"
      when: not needs_upgrade

    - name: Cordon node before upgrade
      ansible.builtin.command:
        cmd: >
          kubectl --kubeconfig {{ talos_kubeconfig_file }} cordon {{ inventory_hostname }}
      environment:
        KUBECONFIG: '{{ talos_kubeconfig_file }}'
      register: cordon_result
      changed_when: cordon_result.rc == 0
      failed_when: false
      delegate_to: localhost
      when: needs_upgrade

    - name: Drain node workloads
      ansible.builtin.command:
        cmd: >
          kubectl --kubeconfig {{ talos_kubeconfig_file }} drain {{ inventory_hostname }}
          --ignore-daemonsets
          --delete-emptydir-data
          --timeout=300s
          --force
      environment:
        KUBECONFIG: '{{ talos_kubeconfig_file }}'
      register: drain_result
      changed_when: drain_result.rc == 0
      failed_when: false
      delegate_to: localhost
      when: needs_upgrade

    # NOTE: --endpoints must point at a CONTROL-PLANE node, NOT the target node.
    # talosctl upgrade runs an internal Kubernetes drain that fetches kubeconfig
    # via the endpoint, and only control-plane nodes serve kubeconfig. Pointing
    # --endpoints at a worker fails with "kubeconfig is only available on control
    # plane nodes" AFTER the install completes (leaving the node cordoned and
    # un-rebooted). Use the control-plane VIP (10.40.0.40) as a stable endpoint.
    - name: Upgrade Talos OS - {{ inventory_hostname }}
      ansible.builtin.command:
        cmd: >
          talosctl upgrade
          --talosconfig {{ talos_config_file }}
          --nodes {{ ansible_host }}
          --endpoints {{ talos_upgrade_endpoint }}
          --image {{ talos_installer_image }}
          --preserve
      environment:
        TALOSCONFIG: '{{ talos_config_file }}'
      register: upgrade_result
      changed_when: upgrade_result.rc == 0
      delegate_to: localhost
      when: needs_upgrade

    - name: Wait for node to reboot
      ansible.builtin.wait_for:
        host: '{{ ansible_host }}'
        port: 50000
        delay: 30
        timeout: 600
      delegate_to: localhost
      when: needs_upgrade

    - name: Uncordon node after upgrade
      ansible.builtin.command:
        cmd: >
          kubectl --kubeconfig {{ talos_kubeconfig_file }} uncordon {{ inventory_hostname }}
      environment:
        KUBECONFIG: '{{ talos_kubeconfig_file }}'
      register: uncordon_result
      changed_when: uncordon_result.rc == 0
      delegate_to: localhost
      when: needs_upgrade

    - name: Verify node health after upgrade (control plane)
      ansible.builtin.command:
        cmd: >
          talosctl health
          --talosconfig {{ talos_config_file }}
          --nodes {{ ansible_host }}
          --endpoints {{ ansible_host }}
          --server=false
          --wait-timeout 5m
      environment:
        TALOSCONFIG: '{{ talos_config_file }}'
      register: health
      changed_when: false
      delegate_to: localhost
      when:
        - needs_upgrade
        - "'controlplane' in group_names"

    - name: Verify node health after upgrade (worker)
      ansible.builtin.command:
        cmd: >
          kubectl --kubeconfig {{ talos_kubeconfig_file }}
          wait node/{{ inventory_hostname }}
          --for=condition=Ready
          --timeout=5m
      environment:
        KUBECONFIG: '{{ talos_kubeconfig_file }}'
      register: health
      changed_when: false
      delegate_to: localhost
      when:
        - needs_upgrade
        - "'workers' in group_names"

    - name: Display upgrade status
      ansible.builtin.debug:
        msg: '✓ {{ inventory_hostname }} upgraded to {{ talos_version }} and healthy'
      when: needs_upgrade
