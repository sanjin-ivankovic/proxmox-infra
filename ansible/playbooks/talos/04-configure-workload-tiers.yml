---
# ============================================================================
# Configure Production Workload Scheduling for Talos Cluster
# ============================================================================
# This playbook applies node configuration for workload scheduling:
#   - PriorityClasses for pod scheduling and eviction order
#   - Node role labels using node-role.kubernetes.io/ prefix
#
# Node Design:
#   talos-cp-1/2/3      : No tier labels (CP taint prevents scheduling)
#   talos-worker-1/2/3  : node-role.kubernetes.io/worker=""
#                         No taints — all workers are equal, scheduler
#                         distributes based on resource availability
#
# Prerequisites:
#   - Cluster bootstrapped (03-bootstrap.yml)
#   - RBAC patches applied (04-apply-rbac.yml)
#   - kubectl installed
#   - Valid kubeconfig
#
# Usage:
#   cd /home/user/Projects/private/proxmox-infra/ansible/talos
#   make configure-tiers
#   OR
#   ansible-playbook -i inventory/hosts.yml \
#     ../playbooks/talos/04-configure-workload-tiers.yml
# ============================================================================

- name: Configure production workload tiers
  hosts: localhost
  gather_facts: false
  become: false

  vars:
    manifests_dir: "{{ playbook_dir }}/../../talos/manifests/cluster-config"

  tasks:
    # ========================================================================
    # Prerequisites Check
    # ========================================================================

    - name: Check prerequisites
      block:
        - name: Verify kubectl is installed
          ansible.builtin.command:
            cmd: kubectl version --client --output=json
          register: kubectl_check
          changed_when: false
          failed_when: kubectl_check.rc != 0

        - name: Verify kubeconfig exists
          ansible.builtin.stat:
            path: "{{ talos_kubeconfig_file }}"
          register: kubeconfig_stat
          failed_when: not kubeconfig_stat.stat.exists

        - name: Test cluster connectivity
          ansible.builtin.command:
            cmd: kubectl --kubeconfig {{ talos_kubeconfig_file }} cluster-info
          environment:
            KUBECONFIG: "{{ talos_kubeconfig_file }}"
          register: cluster_info
          changed_when: false
          failed_when: cluster_info.rc != 0

    - name: Display configuration information
      ansible.builtin.debug:
        msg: |
          ============================================================================
          Configuring Production Workload Scheduling
          ============================================================================

          Kubeconfig: {{ talos_kubeconfig_file }}
          Manifests: {{ manifests_dir }}

          Scheduling Strategy:

          Control Plane Nodes ({{ groups['controlplane'] | join(', ') }}):
             No tier labels - CP taint (node-role.kubernetes.io/control-plane:NoSchedule)
             prevents all non-tolerating workloads from scheduling here.

          Worker Nodes (talos-worker-1, talos-worker-2, talos-worker-3):
             Label: node-role.kubernetes.io/worker=""
             Taint: none — all workers are equal
             Purpose: All workloads, scheduler distributes based on resources

          ============================================================================

    # ========================================================================
    # Step 1: Apply PriorityClasses
    # ========================================================================

    - name: Apply PriorityClasses
      block:
        - name: Check if PriorityClasses manifest exists
          ansible.builtin.stat:
            path: "{{ manifests_dir }}/priority-classes.yaml"
          register: priority_classes_stat

        - name: Fail if PriorityClasses manifest not found
          ansible.builtin.fail:
            msg: "PriorityClasses manifest not found: {{ manifests_dir }}/priority-classes.yaml"
          when: not priority_classes_stat.stat.exists

        - name: Apply PriorityClasses manifest
          ansible.builtin.command:
            cmd: >
              kubectl --kubeconfig {{ talos_kubeconfig_file }}
              apply -f {{ manifests_dir }}/priority-classes.yaml
          environment:
            KUBECONFIG: "{{ talos_kubeconfig_file }}"
          register: apply_priority_classes
          changed_when: "'created' in apply_priority_classes.stdout or 'configured' in apply_priority_classes.stdout"

        - name: Display PriorityClasses result
          ansible.builtin.debug:
            msg: |
              PriorityClasses Applied:
              {{ apply_priority_classes.stdout }}

    # ========================================================================
    # Step 2: Configure Worker Nodes (all identical)
    # ========================================================================

    - name: Configure worker nodes (talos-worker-1, talos-worker-2, talos-worker-3)
      block:
        - name: Label all workers with worker role
          ansible.builtin.command:
            cmd: >
              kubectl --kubeconfig {{ talos_kubeconfig_file }}
              label nodes {{ item }}
              node-role.kubernetes.io/worker=""
              --overwrite
          environment:
            KUBECONFIG: "{{ talos_kubeconfig_file }}"
          register: label_worker
          changed_when: "'labeled' in label_worker.stdout"
          loop:
            - talos-worker-1
            - talos-worker-2
            - talos-worker-3

        - name: Display worker configuration
          ansible.builtin.debug:
            msg: |
              Workers Configured:
              talos-worker-1, talos-worker-2, talos-worker-3:
                node-role.kubernetes.io/worker=""
                taint: none (all workers are equal)

    # ========================================================================
    # Step 5: Verification
    # ========================================================================

    - name: Verify configuration
      block:
        - name: Get node labels and taints
          ansible.builtin.command:
            cmd: >-
              kubectl --kubeconfig {{ talos_kubeconfig_file }}
              get nodes
              -o custom-columns=NAME:.metadata.name,WORKER:.metadata.labels.node-role\.kubernetes\.io/worker,TAINTS:.spec.taints[*].key
          environment:
            KUBECONFIG: "{{ talos_kubeconfig_file }}"
          register: nodes_info
          changed_when: false

        - name: Get PriorityClasses
          ansible.builtin.command:
            cmd: >
              kubectl --kubeconfig {{ talos_kubeconfig_file }}
              get priorityclasses
              -o custom-columns=NAME:.metadata.name,VALUE:.value,GLOBAL-DEFAULT:.globalDefault
          environment:
            KUBECONFIG: "{{ talos_kubeconfig_file }}"
          register: priority_classes_info
          changed_when: false

        - name: Display verification results
          ansible.builtin.debug:
            msg: |
              ============================================================================
              Workload Tiers Configuration Complete!
              ============================================================================

              Node Configuration:
              {{ nodes_info.stdout }}

              PriorityClasses:
              {{ priority_classes_info.stdout }}

              ============================================================================

    # ========================================================================
    # Summary
    # ========================================================================

    - name: Display summary
      ansible.builtin.debug:
        msg: |
          ============================================================================
          Production Workload Scheduling Configured Successfully!
          ============================================================================

          Applied Configuration:
          PriorityClasses (critical-infrastructure, high-priority-stateful, normal-priority)
          Worker label (node-role.kubernetes.io/worker) on all 3 workers
          No taints on workers — scheduler distributes based on resources

          Next Steps:
          1. Push argo-apps changes and sync ArgoCD:
             argocd app sync argocd
             argocd app sync traefik
             argocd app sync cert-manager

          2. Verify pod placement (should be empty on CP nodes):
             kubectl get pods -A -o wide | grep "talos-cp-"

          3. Run cluster verification:
             make verify    # ansible/playbooks/talos/05-verify.yml

          ============================================================================
