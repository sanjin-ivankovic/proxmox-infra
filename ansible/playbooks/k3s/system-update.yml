---
# playbooks/system-update.yml
# Update system packages on all K3s nodes using apt

- name: Update system packages on all nodes
  hosts: k3s_cluster
  become: true
  remote_user: maintainer  # Use non-root user (root login disabled after bootstrap)
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
        autoremove: true
        autoclean: true
