---
# playbooks/k3s/health-check.yml
# Comprehensive Cluster Health Check
# Run this before any maintenance operation

- name: Cluster Health Check
  hosts: masters[0]
  become: true
  gather_facts: true
  tasks:
    - name: Check Node Status
      ansible.builtin.shell: |
        set -o pipefail
        kubectl get nodes --no-headers | grep -v " Ready " || true
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: not_ready_nodes
      changed_when: false

    - name: Check Pod Status
      ansible.builtin.shell: |
        set -o pipefail
        kubectl get pods -A --field-selector=status.phase!=Running,status.phase!=Succeeded,status.phase!=Pending --no-headers || true
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: failed_pods
      changed_when: false

    - name: Check PVC Status
      ansible.builtin.shell: |
        set -o pipefail
        kubectl get pvc -A --no-headers | grep -v Bound || true
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: unbound_pvcs
      changed_when: false

    - name: Check Critical System Components
      ansible.builtin.shell: |
        set -o pipefail
        kubectl get pods -n kube-system -l {{ item }} --no-headers | grep -v Running || true
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      loop:
        - "k8s-app=kube-dns"
        - "app.kubernetes.io/name=traefik"
        - "app.kubernetes.io/name=metallb"
      register: system_components
      changed_when: false

    - name: Generate Health Report
      ansible.builtin.debug:
        msg: |
          === CLUSTER HEALTH REPORT ===
          Date: {{ ansible_date_time.iso8601 }}

          [NODES]
          {% if not_ready_nodes.stdout == "" %}
          ✅ All {{ groups['all'] | length }} nodes are Ready
          {% else %}
          ❌ Not Ready Nodes:
          {{ not_ready_nodes.stdout }}
          {% endif %}

          [PODS]
          {% if failed_pods.stdout == "" %}
          ✅ No failed pods found
          {% else %}
          ⚠️  Failed/Error Pods:
          {{ failed_pods.stdout }}
          {% endif %}

          [STORAGE]
          {% if unbound_pvcs.stdout == "" %}
          ✅ All PVCs are Bound
          {% else %}
          ❌ Unbound PVCs:
          {{ unbound_pvcs.stdout }}
          {% endif %}

    - name: Fail if critical issues found
      ansible.builtin.fail:
        msg: "Critical health checks failed. Resolve issues before proceeding with maintenance."
      when:
        - not_ready_nodes.stdout != "" or unbound_pvcs.stdout != ""
