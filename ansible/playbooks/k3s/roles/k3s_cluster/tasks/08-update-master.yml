---
# roles/k3s_cluster_cluster/tasks/08-update-master.yml
# Sequential master update to maintain quorum

- name: Display master update start
  ansible.builtin.debug:
    msg: 'Starting update of master {{ inventory_hostname }}'
  tags: [update]

# Drain the master node before update (skip first master which runs kubectl)
- name: Drain master node before update
  ansible.builtin.shell: |
    set -o pipefail
    /usr/local/bin/kubectl drain {{ inventory_hostname }} \
      --ignore-daemonsets \
      --delete-emptydir-data \
      --force \
      --grace-period=30 \
      --timeout=5m || true
  args:
    executable: /bin/bash
  delegate_to: "{{ groups['masters'][0] }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: inventory_hostname != groups['masters'][0]
  changed_when: true
  failed_when: false
  tags: [update]

- name: Wait for pods to migrate from master
  ansible.builtin.pause:
    seconds: 15
  when: inventory_hostname != groups['masters'][0]
  tags: [update]

# Stop K3s service cleanly
- name: Stop K3s server service cleanly
  ansible.builtin.service:
    name: k3s
    state: stopped
  when: not ansible_check_mode
  tags: [update]

# Use K3s official cleanup script
- name: Run K3s killall script to clean up processes
  ansible.builtin.command: /usr/local/bin/k3s-killall.sh
  when: not ansible_check_mode
  changed_when: false
  failed_when: false
  tags: [update]

# Wait for processes to die
- name: Wait for K3s processes to terminate
  ansible.builtin.pause:
    seconds: 10
  tags: [update]

# Get remaining K3s process PIDs
- name: Get remaining K3s process PIDs
  ansible.builtin.shell: |
    set -o pipefail
    pgrep -f 'k3s' || true
  args:
    executable: /bin/bash
  register: k3s_cluster_pids
  changed_when: false
  when: not ansible_check_mode
  tags: [update]

- name: Force kill remaining K3s processes if any
  ansible.builtin.shell: |
    set -o pipefail
    if [ -n "{{ k3s_cluster_pids.stdout }}" ]; then
      echo "Force killing PIDs: {{ k3s_cluster_pids.stdout }}"
      for pid in {{ k3s_cluster_pids.stdout }}; do
        if kill -0 "$pid" 2>/dev/null; then
          echo "Killing PID: $pid"
          kill -9 "$pid" 2>/dev/null || true
        else
          echo "PID $pid already gone"
        fi
      done
    fi
  args:
    executable: /bin/bash
  when:
    - not ansible_check_mode
    - k3s_cluster_pids.stdout | length > 0
  changed_when: false
  failed_when: false
  tags: [update]

# Build server arguments (same as initial installation)
- name: Build K3s server install arguments for update
  ansible.builtin.set_fact:
    k3s_cluster_server_args: >-
      server
      {% if inventory_hostname == groups['masters'][0] -%}
      --cluster-init
      {% else -%}
      --server {{ k3s_cluster_endpoint }}
      {% endif -%}
      {% if k3s_cluster_disable is defined and k3s_cluster_disable | length > 0 -%}
      {% for component in k3s_cluster_disable -%}
      --disable {{ component }}
      {% endfor -%}
      {% endif -%}
      {% if k3s_cluster_master_tls_sans is defined and k3s_cluster_master_tls_sans | length > 0 -%}
      {% for san in k3s_cluster_master_tls_sans -%}
      --tls-san {{ san }}
      {% endfor -%}
      {% endif -%}
      --write-kubeconfig-mode {{ k3s_cluster_write_kubeconfig_mode }}
      {{ k3s_cluster_server_extra_args }}
  tags: [update]

# Download and install updated K3s
- name: Download K3s installer
  ansible.builtin.get_url:
    url: '{{ k3s_cluster_install_script_url }}'
    dest: /tmp/k3s-install.sh
    mode: '0755'
  when: not ansible_check_mode
  tags: [update]

# Update K3s server
- name: Update K3s server
  ansible.builtin.shell: |
    set -o pipefail
    /tmp/k3s-install.sh server
  args:
    executable: /bin/bash
  when: not ansible_check_mode
  environment:
    INSTALL_K3S_VERSION: '{{ k3s_cluster_version }}'
    INSTALL_K3S_CHANNEL: '{{ k3s_cluster_channel }}'
    INSTALL_K3S_EXEC: '{{ k3s_cluster_server_args }}'
    K3S_TOKEN: '{{ k3s_cluster_token }}'
  register: k3s_cluster_server_update
  failed_when: k3s_cluster_server_update.rc != 0
  changed_when: k3s_cluster_server_update.rc == 0 and k3s_cluster_needs_update | bool
  tags: [update]

# Wait for API server
- name: Wait for K3s API server to be ready
  ansible.builtin.wait_for:
    port: 6443
    host: '{{ ansible_host }}'
    delay: 10
    timeout: 300
  tags: [update]

# Wait for node to become ready
- name: Wait for node to be ready
  ansible.builtin.shell: |
    set -o pipefail
    /usr/local/bin/kubectl get node {{ inventory_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  args:
    executable: /bin/bash
  register: k3s_cluster_node_ready
  retries: 30
  delay: 10
  until: k3s_cluster_node_ready.stdout == "True"
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tags: [update]

# Uncordon the master node after update
- name: Uncordon master node after update
  ansible.builtin.command: /usr/local/bin/kubectl uncordon {{ inventory_hostname }}
  delegate_to: "{{ groups['masters'][0] }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: inventory_hostname != groups['masters'][0]
  changed_when: true
  tags: [update]

# Verify version
- name: Verify updated K3s version on master
  ansible.builtin.command: /usr/local/bin/k3s --version
  register: k3s_cluster_updated_version
  changed_when: false
  tags: [update]

- name: Display updated version
  ansible.builtin.debug:
    msg: 'Master {{ inventory_hostname }} updated to {{ k3s_cluster_updated_version.stdout_lines[0] }}'
  tags: [update]

# Wait before proceeding to next master
- name: Wait for cluster to stabilize before next master
  ansible.builtin.pause:
    seconds: 30
  tags: [update]
