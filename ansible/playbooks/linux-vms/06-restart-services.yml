---
# playbooks/linux-vms/06-restart-services.yml
# Restart services on Linux VMs

- name: Restart Services (Linux VMs)
  hosts: all
  become: true
  gather_facts: true
  tags: [restart-services]

  tasks:
    - name: Get list of failed systemd units
      ansible.builtin.command: systemctl list-units --state=failed --no-legend --plain
      register: failed_units
      changed_when: false

    - name: Display failed units
      ansible.builtin.debug:
        msg: "Failed units: {{ failed_units.stdout_lines }}"
      when: failed_units.stdout_lines | length > 0

    - name: Restart failed units
      ansible.builtin.systemd:
        name: "{{ item.split()[0] }}"
        state: restarted
      loop: "{{ failed_units.stdout_lines }}"
      when: failed_units.stdout_lines | length > 0
      ignore_errors: true

    - name: Display restart summary
      ansible.builtin.debug:
        msg:
          - "Services checked on {{ inventory_hostname }}"
          - "  Failed units found: {{ failed_units.stdout_lines | length }}"
