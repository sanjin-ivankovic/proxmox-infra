---
# playbooks/linux-vms/03-verify.yml
# Verify Linux VM configuration and health

- name: Verify Linux VM Health
  hosts: all
  become: true
  gather_facts: true
  tags: [verify]

  tasks:
    - name: Check system uptime
      ansible.builtin.command: uptime -p
      register: uptime_check
      changed_when: false

    - name: Check disk usage
      ansible.builtin.command: df -h /
      register: disk_check
      changed_when: false

    - name: Check failed systemd units
      ansible.builtin.command: systemctl list-units --state=failed --no-legend
      register: failed_units
      changed_when: false

    - name: Check running services count
      ansible.builtin.command: systemctl list-units --type=service --state=running --no-legend --plain
      register: running_services
      changed_when: false

    - name: Display health report
      ansible.builtin.debug:
        msg:
          - "Health Report for {{ inventory_hostname }}"
          - "  Uptime: {{ uptime_check.stdout }}"
          - "  Disk Usage: {{ disk_check.stdout_lines[-1] | trim }}"
          - "  Running Services: {{ running_services.stdout_lines | length }}"
          - "  Failed Units: {{ failed_units.stdout_lines | length }}"
          - "{{ '  WARNING: ' + failed_units.stdout if failed_units.stdout_lines | length > 0 else '  No failed units' }}"
