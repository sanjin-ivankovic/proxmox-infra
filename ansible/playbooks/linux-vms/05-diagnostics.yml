---
# playbooks/linux-vms/05-diagnostics.yml
# Collect diagnostic information from Linux VMs

- name: Collect Diagnostics (Linux VMs)
  hosts: all
  become: true
  gather_facts: true
  tags: [diagnostics]

  tasks:
    - name: Get system uptime
      ansible.builtin.command: uptime -p
      register: uptime_info
      changed_when: false

    - name: Get memory usage
      ansible.builtin.command: free -h
      register: memory_info
      changed_when: false

    - name: Get disk usage
      ansible.builtin.command: df -h /
      register: disk_info
      changed_when: false

    - name: Get CPU info
      ansible.builtin.command: nproc
      register: cpu_info
      changed_when: false

    - name: Check failing systemd units
      ansible.builtin.command: systemctl list-units --state=failed --no-legend
      register: failed_units
      changed_when: false

    - name: Get running services
      ansible.builtin.command: systemctl list-units --type=service --state=running --no-legend --plain
      register: running_services
      changed_when: false

    - name: Display diagnostic report
      ansible.builtin.debug:
        msg:
          - "Diagnostic Report for {{ inventory_hostname }}"
          - "----------------------------------------"
          - "UPTIME: {{ uptime_info.stdout }}"
          - ""
          - "CPU CORES: {{ cpu_info.stdout }}"
          - ""
          - "MEMORY:"
          - "{{ memory_info.stdout }}"
          - ""
          - "DISK:"
          - "{{ disk_info.stdout }}"
          - ""
          - "RUNNING SERVICES: {{ running_services.stdout_lines | length }}"
          - ""
          - "FAILED UNITS: {{ 'None' if failed_units.stdout == '' else failed_units.stdout }}"
          - "----------------------------------------"
