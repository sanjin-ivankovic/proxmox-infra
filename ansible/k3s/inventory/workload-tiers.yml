# ============================================================================
# K3s Workload Tier Groupings
# ============================================================================
# This file extends the auto-generated hosts.yml with workload-tier sub-groups
# for the three-tier architecture:
#   - Infrastructure tier: Masters (control plane nodes)
#   - Stateful tier: worker-1 (persistent storage workloads)
#   - Stateless tier: workers 2-3 (ephemeral workloads)
#
# Usage: Include this file in playbooks alongside hosts.yml
# ============================================================================

all:
  children:
    # ========================================================================
    # Infrastructure Tier (Control Plane)
    # ========================================================================
    # Hosts infrastructure components: ArgoCD, Traefik, MetalLB controller,
    # Cert-Manager, Sealed Secrets, Prometheus Operator, etc.
    #
    # Taint: node-role.kubernetes.io/control-plane=true:NoSchedule (K3s default)
    # Label: workload-tier=infrastructure
    # ========================================================================
    infrastructure_tier:
      hosts:
        k3s-master-1: {}
        k3s-master-2: {}
        k3s-master-3: {}
      vars:
        workload_tier: infrastructure
        workload_tier_taint: false # Masters already have control-plane taint from K3s

    # ========================================================================
    # Stateful Tier (Persistent Storage)
    # ========================================================================
    # Hosts stateful workloads: PostgreSQL, Valkey, Prometheus, Grafana,
    # Alertmanager - anything with persistent storage requirements
    #
    # Taint: workload-type=stateful:NoSchedule
    # Label: workload-tier=stateful
    # ========================================================================
    stateful_tier:
      hosts:
        k3s-worker-1: {}
      vars:
        workload_tier: stateful
        workload_tier_taint: true
        taint_key: workload-type
        taint_value: stateful
        taint_effect: NoSchedule

    # ========================================================================
    # Stateless Tier (Ephemeral Workloads)
    # ========================================================================
    # Hosts stateless applications: FreshRSS, Cloudflared, and other apps
    # without persistent state requirements
    #
    # Taint: workload-type=stateless:NoSchedule
    # Label: workload-tier=stateless
    # ========================================================================
    stateless_tier:
      hosts:
        k3s-worker-2: {}
        k3s-worker-3: {}
      vars:
        workload_tier: stateless
        workload_tier_taint: true
        taint_key: workload-type
        taint_value: stateless
        taint_effect: NoSchedule

    # ========================================================================
    # Convenience Groups
    # ========================================================================
    all_workers:
      children:
        stateful_tier:
        stateless_tier:

    all_tiers:
      children:
        infrastructure_tier:
        stateful_tier:
        stateless_tier:
