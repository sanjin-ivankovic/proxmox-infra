---
# Molecule scenario for the common_users role.
# Driver: docker, systemd-enabled Debian image (matches the LXC fleet).
#
# Run from the collection root (ansible/):
#   ANSIBLE_COLLECTIONS_PATH=$PWD/collections molecule test -s common_users
driver:
  name: docker

platforms:
  - name: common-users-debian13
    image: geerlingguy/docker-debian13-ansible:latest
    pre_build_image: true
    command: /usr/lib/systemd/systemd
    cgroupns_mode: host
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

provisioner:
  name: ansible
  # The homelab.proxmox collection is installed into ansible's default
  # collections path before molecule runs, so it and its deps both resolve.
  playbooks:
    converge: converge.yml
    verify: verify.yml

# Only converge + verify are defined; declare the sequence we actually run.
scenario:
  test_sequence:
    - syntax
    - create
    - converge
    - idempotence
    - verify
    - destroy

verifier:
  name: ansible
