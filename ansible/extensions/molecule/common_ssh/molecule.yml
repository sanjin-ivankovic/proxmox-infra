---
# Molecule scenario for the common_ssh role.
# Driver: docker (matches the Debian-LXC fleet). The image runs systemd so the
# role's "restart ssh" handler and `sshd -t` validation exercise realistically.
#
# Run from the collection root (ansible/):
#   ANSIBLE_COLLECTIONS_PATH=$PWD/collections molecule -c extensions/molecule/.config.yml test -s common_ssh
# (CI wires ANSIBLE_COLLECTIONS_PATH; see .gitlab-ci.yml test:molecule.)
driver:
  name: docker

platforms:
  - name: common-ssh-debian13
    image: geerlingguy/docker-debian13-ansible:latest
    pre_build_image: true
    command: /usr/lib/systemd/systemd
    cgroupns_mode: host
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

provisioner:
  name: ansible
  # The homelab.proxmox collection is installed into ansible's default
  # collections path before molecule runs (see the Makefile/CI), so it and its
  # community.* deps both resolve without a collections_path override.
  playbooks:
    converge: converge.yml
    verify: verify.yml

# This scenario defines only converge + verify playbooks, so declare the
# sequence we actually run (the default also tries dependency/prepare/
# side_effect/cleanup, which we don't have).
scenario:
  test_sequence:
    - syntax
    - create
    - converge
    - idempotence
    - verify
    - destroy

verifier:
  name: ansible
