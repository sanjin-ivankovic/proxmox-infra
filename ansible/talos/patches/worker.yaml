---
# ============================================================================
# Talos Machine Config Patch - Worker Nodes
# ============================================================================
# This patch is applied only to worker nodes.
#
# Usage: Applied automatically during config generation via
#        talosctl gen config --config-patch-worker @patches/worker.yaml
# ============================================================================

machine:
  # Node labels applied natively by Talos at boot (survive reboot/reinstall).
  # node.longhorn.io/create-default-disk=true marks workers as Longhorn storage
  # nodes. Combined with Longhorn's createDefaultDiskLabeledNodes=true, ONLY
  # workers ever become storage nodes — control-plane nodes never get a default
  # disk, so Longhorn replica I/O can't starve etcd (which shares the CP node's
  # disk). See cluster/infrastructure/longhorn/values.yaml.
  nodeLabels:
    node.longhorn.io/create-default-disk: "true"

  # Kubelet configuration optimized for workers
  kubelet:
    extraArgs:
      # Node role labels are applied by the Ansible workload-tiers playbook
      # (05-configure-workload-tiers.yml) using node-role.kubernetes.io/ convention

      # Increase pod eviction thresholds for workload stability
      eviction-hard: "memory.available<256Mi,nodefs.available<10%,imagefs.available<10%"
      eviction-soft: "memory.available<512Mi,nodefs.available<15%,imagefs.available<15%"
      eviction-soft-grace-period: "memory.available=1m30s,nodefs.available=2m,imagefs.available=2m"

      # Allow more pods per node (default is 110)
      max-pods: "150"

  # Disable swap (required for Kubernetes)
  sysctls:
    vm.swappiness: "0"
