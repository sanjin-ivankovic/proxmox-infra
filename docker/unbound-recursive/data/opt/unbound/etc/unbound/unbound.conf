# Unbound DNS Server Configuration
# Validating, recursive, caching DNS resolver.
#
# This instance recurses from the root servers itself (no upstream forwarder).
# Tradeoffs vs the DoT-forwarding variant:
#   - Queries to root/TLD/authoritative servers are PLAINTEXT, so an on-path
#     observer (e.g. the ISP) can see them. The DoT forwarder encrypts them.
#   - The host firewall must allow OUTBOUND UDP+TCP/53 to the internet.
#   - No single resolver (e.g. Quad9) sees the full query stream.
# DNSSEC is validated locally either way. Inline annotations: "# default" =
# value matches the Unbound 1.25.x default (kept for explicitness),
# "# non-default" = intentional override.
#
# Documentation: https://unbound.docs.nlnetlabs.nl/
#
# This file is hand-edited and version-controlled. Resource-tuned values
# (num-threads, cache sizes, cache slabs) are generated at container start into
# dynamic.conf, which is included inside the server: block below.

server:
    ###########################################################################
    # BASIC SETTINGS
    ###########################################################################

    # Logging verbosity (0=errors .. 5=client id on cache miss)
    verbosity: 1                       # default

    # Log to stderr/stdout for Docker; setting logfile disables syslog
    logfile: ""                        # non-default: container logging

    # Working directory (trust anchor + includes resolve relative to here)
    directory: "/opt/unbound/etc/unbound"

    # Drop privileges to the build's unprivileged user after binding the port
    username: "_unbound"               # non-default: image builds _unbound

    # Disable chroot - Docker provides container isolation
    chroot: ""                         # non-default: container isolation

    # Run in foreground (Docker needs the process to stay attached)
    do-daemonize: no                   # non-default: container lifecycle

    ###########################################################################
    # NETWORK CONFIGURATION
    ###########################################################################

    # Listen on localhost only - co-located with AdGuard Home, which is this
    # resolver's only client and forwards to us at 127.0.0.1:5335.
    interface: 127.0.0.1               # non-default: localhost-only
    port: 5335                         # non-default: avoids AdGuard's :53

    do-ip4: yes                        # default
    do-ip6: no                         # non-default: IPv4-only homelab
    do-udp: yes                        # default
    do-tcp: yes                        # default

    ###########################################################################
    # ACCESS CONTROL
    ###########################################################################

    # Interface is bound to 127.0.0.1, so only localhost can reach us. These
    # RFC1918 allows are a safety net in case the interface binding changes;
    # only 127.0.0.0/8 is allowed by Unbound's default.
    access-control: 10.0.0.0/8 allow       # non-default: safety net
    access-control: 172.16.0.0/12 allow    # non-default: safety net
    access-control: 192.168.0.0/16 allow   # non-default: safety net
    access-control: 127.0.0.0/8 allow      # default (localhost implicitly allowed)
    access-control: 0.0.0.0/0 refuse       # default (everything else refused)

    ###########################################################################
    # PERFORMANCE TUNING
    ###########################################################################

    # Resource-tuned values generated at startup from container memory/CPU:
    #   num-threads, {rrset,msg,key,neg}-cache-size, *-cache-slabs
    include: "/opt/unbound/etc/unbound/dynamic.conf"

    # Built with libevent, so outgoing-range is not capped at 1024. Per the
    # perf guide, outgoing-range = 2 x num-queries-per-thread.
    num-queries-per-thread: 4096       # non-default (default 2048 w/ libevent)
    outgoing-range: 8192               # non-default (default 4096 w/ libevent)

    # Extra TCP buffers per thread - recursion falls back to TCP for truncated
    # (large) authoritative answers and DNSSEC, so more outgoing buffers help.
    outgoing-num-tcp: 200              # non-default (default 10)
    incoming-num-tcp: 200              # non-default (default 10)
    tcp-idle-timeout: 30000            # default

    # UDP socket buffers: use the system value. LXC containers may not grant
    # larger buffers without host net.core.rmem_max / wmem_max tuning.
    so-rcvbuf: 0                       # default (system value)
    so-sndbuf: 0                       # default (system value)

    # Keep popular cache entries fresh by prefetching before expiry
    prefetch: yes                      # non-default (default no)
    prefetch-key: yes                  # non-default (default no)

    # Serve stale answers while refreshing (RFC 8767)
    serve-expired: yes                 # non-default (default no)
    serve-expired-ttl: 86400           # default (when serve-expired is on)
    serve-expired-ttl-reset: no        # default

    edns-buffer-size: 1232             # default (DNS Flag Day 2020)
    rrset-roundrobin: yes              # default
    minimal-responses: yes             # default

    # delay-close keeps a timed-out UDP port open briefly so a late reply from
    # an authoritative server does not hit a closed port. Meaningful for
    # recursion (lots of direct UDP to authoritatives).
    delay-close: 1500                  # non-default (default 0)

    # Drop incoming (AdGuard -> us, UDP) queries that waited too long in the
    # socket buffer, e.g. after a restart backlog.
    sock-queue-timeout: 3              # non-default (default 0)

    so-reuseport: yes                  # default (perf guide recommends it)

    # Prefer the fastest-responding authoritative servers. Genuinely useful for
    # recursion: most delegations expose several NS, and this favours the
    # quickest 90% of the time while still exploring the rest.
    fast-server-permil: 900            # non-default (default 0)
    fast-server-num: 3                 # default

    ###########################################################################
    # PRIVACY AND SECURITY HARDENING
    ###########################################################################

    hide-identity: yes                 # non-default (default no)
    hide-version: yes                  # non-default (default no)
    hide-trustanchor: yes              # non-default (default no)
    hide-http-user-agent: no           # default

    identity: "DNS"                    # custom id.server / hostname.bind reply
    http-user-agent: "DNS"             # custom outgoing HTTP User-Agent

    # DNS Cookies (RFC 7873/9018) - source verification / anti-amplification
    answer-cookie: yes                 # non-default (default no)

    # Refuse ANY queries (commonly abused for amplification)
    deny-any: yes                      # non-default (default no)

    # qname minimisation (RFC 7816) - sends only the minimum labels to each
    # authoritative server, so no single one sees the full query name. More
    # impactful for recursion than for forwarding.
    qname-minimisation: yes            # default
    qname-minimisation-strict: no      # default

    # Aggressive NSEC (RFC 8198) - synthesises negatives from cached NSEC;
    # benefits from the enlarged neg-cache-size (see dynamic.conf).
    aggressive-nsec: yes               # default

    # Recursion-path hardening - in force here because we fetch directly from
    # authoritative servers (no trusted forwarder doing it for us).
    harden-glue: yes                   # default (trust glue only within authority)
    harden-dnssec-stripped: yes        # default (require DNSSEC for signed zones)
    harden-below-nxdomain: yes         # default (RFC 8020)
    harden-algo-downgrade: no          # default (enabling violates RFC 6840)
    harden-unknown-additional: no      # default
    harden-large-queries: yes          # non-default (default no): ignore oversized queries
    harden-short-bufsize: yes          # default
    harden-referral-path: no           # default (experimental; extra auth-server load)

    # 0x20 query randomisation - foils cache-poisoning spoof attempts on the
    # plaintext UDP queries we send to authoritative servers. Genuinely valuable
    # for recursion (no TLS protecting the upstream hop).
    use-caps-for-id: yes               # non-default (default no)

    val-clean-additional: yes          # default

    # TTL bounds: cache-min-ttl 0 respects authoritative intent (fast failover)
    cache-min-ttl: 0                   # default
    cache-max-ttl: 86400               # default
    val-bogus-ttl: 60                  # default

    # Extended DNS Errors (RFC 8914) - richer diagnostics to clients
    ede: yes                           # non-default (default no)
    ede-serve-expired: yes             # non-default (default no)

    # Active for recursion: caps queries-per-second to authoritative servers,
    # blunting random-subdomain (NXDOMAIN) flood attacks. Forwarders are exempt
    # from this, but we are not forwarding.
    ratelimit: 1000                    # non-default (default 0)

    # Active for recursion: authoritative replies arrive over spoofable UDP, so
    # a flood of unsolicited replies triggers a defensive cache flush.
    unwanted-reply-threshold: 10000000 # non-default (default 0)

    # Default: do not send queries to localhost. (No localhost upstream exists
    # in recursive mode.)
    do-not-query-localhost: yes        # default

    ###########################################################################
    # DNSSEC VALIDATION
    ###########################################################################

    module-config: "validator iterator"   # default (DNSSEC validation enabled)

    # RFC 5011 auto-updated root trust anchor (maintained by unbound-anchor)
    auto-trust-anchor-file: "var/root.key"

    # Serve SERVFAIL on validation failure (do not hand bogus data to clients)
    val-permissive-mode: no            # default

    # No tls-cert-bundle: there is no DoT/TLS upstream to authenticate in
    # recursive mode. (Re-add it if you switch this config to forwarding.)
    # tls-cert-bundle: /etc/ssl/certs/ca-certificates.crt

    # Root hints: Unbound ships built-in root server hints, so none is required.
    # To pin/refresh your own, drop the IANA named.root at the path below and
    # uncomment (https://www.internic.net/domain/named.root):
    # root-hints: "/opt/unbound/etc/unbound/root.hints"

    # Skip DNSSEC validation for RFC1918/RFC4193 reverse zones
    insecure-lan-zones: yes            # non-default (default no)

    ###########################################################################
    # LOCAL ZONES
    ###########################################################################

    # Private address space - strip these from public answers (DNS rebinding
    # protection). No private addresses are filtered by default.
    private-address: 10.0.0.0/8        # non-default
    private-address: 172.16.0.0/12     # non-default
    private-address: 192.168.0.0/16    # non-default
    private-address: 169.254.0.0/16    # non-default
    # IPv6 private addresses (uncomment when IPv6 is enabled)
    # private-address: fd00::/8
    # private-address: fe80::/10

    private-domain: "localhost."       # non-default
    private-domain: "local."           # non-default

    # localhost zones - these restate Unbound's built-in defaults; kept
    # explicit for clarity (the built-in localhost. default uses type redirect).
    local-zone: "localhost." static
    local-data: "localhost. 10800 IN A 127.0.0.1"
    local-data: "localhost. 10800 IN AAAA ::1"

    local-zone: "127.in-addr.arpa." static
    local-data: "1.0.0.127.in-addr.arpa. 10800 IN PTR localhost."

    ###########################################################################
    # INCLUDE CUSTOM CONFIGURATIONS
    ###########################################################################

    # Optional local record overrides (uncomment to enable)
    # include: "/opt/unbound/etc/unbound/a-records.conf"
    # include: "/opt/unbound/etc/unbound/srv-records.conf"

# No forwarding: the iterator module recurses from the root servers. (The
# forwarding variant includes forward-records.conf here instead.)

###############################################################################
# REMOTE CONTROL (for unbound-control)
###############################################################################

# Unix socket - simpler and more secure than TCP/IP inside the container
remote-control:
    control-enable: yes
    control-use-cert: no
    control-interface: "/opt/unbound/etc/unbound/unbound.sock"
