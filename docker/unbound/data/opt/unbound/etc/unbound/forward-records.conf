###############################################################################
# FORWARDING CONFIGURATION
###############################################################################

forward-zone:
    # Forward all external queries to Quad9 over DNS-over-TLS, so the ISP cannot
    # see queries (encrypted on :853). unbound validates DNSSEC on the responses.
    # Local zones (example.com, reverse DNS) are handled by AdGuard Home
    # conditional forwarding directly to Technitium.
    name: "."
    forward-tls-upstream: yes

    # --- Quad9 (primary) — DNSSEC, no-ECS (privacy), no-log ---
    forward-addr: 9.9.9.9@853#dns.quad9.net
    forward-addr: 149.112.112.112@853#dns.quad9.net

    # --- Cloudflare (secondary) — uncomment for cross-provider resilience ---
    # forward-addr: 1.1.1.1@853#cloudflare-dns.com
    # forward-addr: 1.0.0.1@853#cloudflare-dns.com
