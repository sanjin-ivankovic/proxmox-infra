# Minimal ansible.cfg for CI jobs (test:collection, test:molecule).
#
# Pointed at explicitly via ANSIBLE_CONFIG so ansible loads it without the
# "world writable directory, ignoring ansible.cfg" warning that the in-tree
# ansible/ansible.cfg triggers on GitLab's world-writable build dir.
#
# It deliberately OMITS the dev ansible.cfg's CI-incompatible settings: the
# relative collections_path/inventory (which break when a tool runs from another
# cwd, e.g. molecule's ephemeral dir) and vault_password_file (the gitignored
# ./.vault_pass is absent in CI). Collections come from ANSIBLE_COLLECTIONS_PATH
# set in the job; nothing in these jobs needs the inventory or vault.
[defaults]
interpreter_python = auto_silent
deprecation_warnings = True
retry_files_enabled = False
host_key_checking = False
